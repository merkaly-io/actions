name: Release
description: Generate changelog and publish GitHub release

runs:
  using: composite
  steps:
    - uses: merkaly-io/actions/setup@master

    - run: |
        CURRENT_TAG="${GITHUB_REF_NAME}"
        PREVIOUS_TAG="$(git tag --sort=-version:refname | grep -Fxv "$CURRENT_TAG" | head -n 1)"

        if [ -n "$PREVIOUS_TAG" ]; then
          pnpm exec changelogen --from "$PREVIOUS_TAG" --to "$CURRENT_TAG" --no-output > release-notes.md
        else
          pnpm exec changelogen --to "$CURRENT_TAG" --no-output > release-notes.md
        fi
      shell: bash

    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body_path: release-notes.md
