name: Release

on:
  workflow_call:
    inputs:
      railway_project_id:
        required: true
        type: string
      railway_environment_id:
        required: true
        type: string
      railway_service_id:
        required: true
        type: string
    secrets:
      railway_token:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag revision
        run: |
          git fetch origin master --force --tags
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm lint
        continue-on-error: true

      - name: Build code
        run: pnpm build

      - name: Deploy to Railway
        run: |
          pnpm dlx @railway/cli up \
            --ci \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT_ID" \
            --service "$RAILWAY_SERVICE_ID" \
            -m "${{ github.ref_name }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.railway_token }}
          RAILWAY_PROJECT_ID: ${{ inputs.railway_project_id }}
          RAILWAY_ENVIRONMENT_ID: ${{ inputs.railway_environment_id }}
          RAILWAY_SERVICE_ID: ${{ inputs.railway_service_id }}

  release:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate release notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep -Fxv "$CURRENT_TAG" | head -n 1)"

          if [ -n "$PREVIOUS_TAG" ]; then
            pnpm exec changelogen --from "$PREVIOUS_TAG" --to "$CURRENT_TAG" --no-output > release-notes.md
          else
            pnpm exec changelogen --to "$CURRENT_TAG" --no-output > release-notes.md
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
